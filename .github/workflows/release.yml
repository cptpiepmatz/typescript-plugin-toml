name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.5.1'
        required: true
        type: string
      release_name:
        description: 'Release title. Defaults to the tag.'
        required: false
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean

jobs:
  release:
    name: build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup pnpm
        uses: pnpm/action-setup@v4

      - name: setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: pnpm

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm run build

      - name: pack
        run: pnpm pack --pack-destination release

      - name: create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          tarball="$(find release -name '*.tgz' -print -quit)"
          if [ -z "$tarball" ]; then
            echo "No package tarball found"
            exit 1
          fi

          args=("$TAG" "$tarball" --generate-notes)
          if [ -n "$RELEASE_NAME" ]; then
            args+=(--title "$RELEASE_NAME")
          else
            args+=(--title "$TAG")
          fi
          if [ "$DRAFT" = "true" ]; then
            args+=(--draft)
          fi
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
